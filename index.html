<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-amber-50 flex flex-col items-center justify-center gap-8 p-8">

  <h1 class="text-4xl font-bold text-amber-800">🐱 Cat of the Moment</h1>

  <div id="cat-container" class="w-80 h-80 rounded-2xl overflow-hidden shadow-xl bg-amber-100 flex items-center justify-center">
    <p class="text-amber-400 text-lg font-medium">Click the button to see a cat!</p>
  </div>

  <button
    id="show-cat-btn"
    class="px-8 py-3 bg-amber-500 hover:bg-amber-600 active:scale-95 text-white text-lg font-semibold rounded-full shadow-md transition-all duration-150 cursor-pointer"
  >
    Show me a cat 🐾
  </button>

  <p id="loading" class="text-amber-600 text-sm hidden">Loading...</p>

  <script>
    const btn = document.getElementById('show-cat-btn');
    const container = document.getElementById('cat-container');
    const loading = document.getElementById('loading');

    btn.addEventListener('click', async () => {
      // Show loading state
      loading.classList.remove('hidden');
      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      container.innerHTML = '';

      try {
        const response = await fetch('https://api.thecatapi.com/v1/images/search');
        const [data] = await response.json();

        const img = document.createElement('img');
        img.src = data.url;
        img.alt = 'A random cat';
        img.className = 'w-full h-full object-cover';

        container.appendChild(img);
      } catch (error) {
        container.innerHTML = '<p class="text-red-400 text-sm px-4 text-center">Oops, couldn\'t fetch a cat. Check your connection!</p>';
      } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    });
  </script>

</body>
</html>
